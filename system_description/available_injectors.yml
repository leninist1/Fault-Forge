    quarantine_reason: low_yield_for_ase_nier_gold_profile
  host_tc:
    enabled: false
    quarantine_reason: low_yield_for_ase_nier_gold_profile
  docker_exec:
    enabled: false
    quarantine_reason: low_yield_for_ase_nier_gold_profile

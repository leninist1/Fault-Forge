  - id: delivery_order_orphan
    name: Food delivery record references invalid order
    journey: delivery
    entity: food_order
    invariant: INV-DELIVERY-ORDER-018
    dimension: data_consistency
    semantic_violation_type: orphan_delivery_order
    injector_family: database_modifier
    canary_status: pending_runtime_validation
    expected_impacts: [orphan_delivery_order]
    expected_business_slis: [order_read_success_rate]
    expected_invariants: [INV-DELIVERY-ORDER-018]
    expected_services: [ts-delivery-service, ts-order-service]
    cleanup_strategy: restore_modified_rows_from_snapshot
    variants:
      - id: delivery_bad_order_single
        mode: single_point
        target_service: ts-delivery-service
        target_db: ts-delivery-mysql
        target_table: delivery
        target_field: order_id
        condition: order_id IS NULL
        modify_value: NONEXISTENT_ORDER
        expected_propagation: [ts-delivery-service, ts-order-service]
      - id: delivery_empty_food_cascade
        mode: cascading
        target_service: ts-delivery-service
        target_db: ts-delivery-mysql

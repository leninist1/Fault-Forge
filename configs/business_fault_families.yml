    expected_impacts: [lost_rebook_traceability, illegal_order_state_transition]
    expected_business_slis: [order_read_success_rate]
    expected_invariants: [INV-REBOOK-TRACE-010]
    expected_services: [ts-rebook-service, ts-order-service]
    cleanup_strategy: restore_modified_rows_from_snapshot
    variants:

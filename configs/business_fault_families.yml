version: 1
description: Curated Train-Ticket business fault families for ASE NIER gold production.
gold_admission:
  canary_attempts: 3
  min_gold_rate: 0.50
  require_cleanup_healthy: true
  require_strong_evidence: true
families:
  - id: order_status_divergence
    name: Order status divergence
    journey: order_cancel_rebook
    entity: order
    invariant: INV-ORDER-STATE-008
    dimension: state_transition
    semantic_violation_type: illegal_order_state_transition
    injector_family: database_modifier
    canary_status: ready_known_gold_path
    expected_impacts: [illegal_order_state_transition]
    expected_business_slis: [order_read_success_rate]
    expected_invariants: [INV-ORDER-STATE-008]
    expected_services: [ts-order-service, ts-cancel-service, ts-rebook-service]
    cleanup_strategy: restore_modified_rows_from_snapshot
    variants:
      - id: order_status_invalid_single
        mode: single_point
        target_service: ts-order-service
        target_db: ts-order-mysql
        target_table: orders
        target_field: status
        condition: status = 1
        modify_value: 99
        expected_propagation: [ts-order-service, ts-cancel-service]
      - id: order_status_paid_without_payment_cascade
        mode: cascading
        target_service: ts-order-service
        target_db: ts-order-mysql
        target_table: orders
        target_field: status
        condition: status = 1
        modify_value: 2
        expected_propagation: [ts-order-service, ts-payment-service, ts-inside-payment-service]

  - id: payment_order_mismatch
    name: Payment succeeds while order state is inconsistent
    journey: payment
    entity: payment
    invariant: INV-PAY-ORDER-001
    dimension: data_consistency
    semantic_violation_type: cross_service_state_mismatch
    injector_family: database_modifier
    canary_status: pending_runtime_validation
    expected_impacts: [order_payment_consistency_violation]
    expected_business_slis: [payment_submit_business_invalid_rate, order_read_success_rate]
    expected_invariants: [INV-PAY-ORDER-001]
    expected_services: [ts-order-service, ts-payment-service, ts-inside-payment-service]
    cleanup_strategy: restore_modified_rows_from_snapshot
    variants:
      - id: order_paid_without_payment_single
        mode: single_point
        target_service: ts-order-service
        target_db: ts-order-mysql
        target_table: orders
        target_field: status
        condition: status = 1
        modify_value: 2
        expected_propagation: [ts-order-service, ts-payment-service]
      - id: payment_success_for_unpaid_order_cascade
        mode: cascading
        target_service: ts-payment-service
        target_db: ts-payment-mysql
        target_table: payments
        target_field: order_id
        condition: order_id IS NOT NULL
        modify_value: 00000000-0000-0000-0000-000000000000
        expected_propagation: [ts-payment-service, ts-order-service, ts-inside-payment-service]

  - id: payment_amount_drift
    name: Payment amount drifts from order amount
    journey: payment
    entity: payment
    invariant: INV-PAY-AMOUNT-002
    dimension: amount_or_price_drift
    semantic_violation_type: amount_or_price_drift
    injector_family: database_modifier
    canary_status: pending_runtime_validation
    expected_impacts: [payment_amount_drift]
    expected_business_slis: [payment_submit_business_invalid_rate]
    expected_invariants: [INV-PAY-AMOUNT-002]
    expected_services: [ts-payment-service, ts-order-service]
    cleanup_strategy: restore_modified_rows_from_snapshot
    variants:
      - id: zero_payment_amount_single
        mode: single_point
        target_service: ts-payment-service
        target_db: ts-payment-mysql
        target_table: payments
        target_field: amount
        condition: amount > 0
        modify_value: 0
        expected_propagation: [ts-payment-service, ts-order-service]
      - id: negative_payment_amount_cascade
        mode: cascading
        target_service: ts-payment-service
        target_db: ts-payment-mysql
        target_table: payments
        target_field: amount
        condition: amount > 0
        modify_value: -1
        expected_propagation: [ts-payment-service, ts-order-service, ts-inside-payment-service]

  - id: inventory_preservation_mismatch
    name: Booking succeeds without matching inventory change
    journey: ticket_inventory_preservation
    entity: ticket_inventory
    invariant: INV-BOOK-INV-004
    dimension: partial_workflow_commit
    semantic_violation_type: inventory_reservation_mismatch
    injector_family: database_modifier
    canary_status: pending_runtime_validation
    expected_impacts: [inventory_reservation_mismatch]
    expected_business_slis: [booking_precheck_business_invalid_rate, booking_precheck_success_rate]
    expected_invariants: [INV-BOOK-INV-004]
    expected_services: [ts-preserve-service, ts-seat-service, ts-order-service]
    cleanup_strategy: restore_modified_rows_from_snapshot
    variants:
      - id: preserve_order_without_seat_decrement_single
        mode: single_point
        target_service: ts-seat-service
        target_db: ts-order-mysql
        target_table: orders
        target_field: seat_number
        condition: status = 1 AND seat_number IS NOT NULL AND seat_number <> ''
        modify_value: UNASSIGNED_BY_FAULT
        expected_propagation: [ts-seat-service, ts-preserve-service]
      - id: preserve_order_inventory_cascade
        mode: cascading
        target_service: ts-preserve-service
        target_db: ts-order-mysql
        target_table: orders
        target_field: status
        condition: status = 1
        modify_value: 0
        expected_propagation: [ts-preserve-service, ts-seat-service, ts-order-service]

  - id: cancel_without_inventory_release
    name: Cancellation does not release preserved inventory
    journey: order_cancel_rebook
    entity: ticket_inventory
    invariant: INV-CANCEL-INV-005
    dimension: partial_workflow_commit
    semantic_violation_type: cancel_release_mismatch
    injector_family: database_modifier
    canary_status: pending_runtime_validation
    expected_impacts: [cancel_release_mismatch]
    expected_business_slis: [booking_precheck_business_invalid_rate]
    expected_invariants: [INV-CANCEL-INV-005]
    expected_services: [ts-cancel-service, ts-seat-service, ts-order-service]
    cleanup_strategy: restore_modified_rows_from_snapshot
    variants:
      - id: cancel_record_status_single
        mode: single_point
        target_service: ts-cancel-service
        target_db: ts-cancel-mysql
        target_table: cancel_records
        target_field: status
        condition: status = 1
        modify_value: 9
        expected_propagation: [ts-cancel-service, ts-seat-service]
      - id: cancelled_order_inventory_cascade
        mode: cascading
        target_service: ts-order-service
        target_db: ts-order-mysql
        target_table: orders
        target_field: status
        condition: status = 1
        modify_value: 4
        expected_propagation: [ts-order-service, ts-cancel-service, ts-seat-service]

  - id: contact_ownership_violation
    name: Booking uses passenger contact owned by another user
    journey: authentication_user_context
    entity: contact
    invariant: INV-CONTACT-OWN-006
    dimension: data_consistency
    semantic_violation_type: ownership_violation
    injector_family: database_modifier
    canary_status: pending_runtime_validation
    expected_impacts: [passenger_ownership_violation]
    expected_business_slis: [contacts_fetch_success_rate, booking_precheck_success_rate]
    expected_invariants: [INV-CONTACT-OWN-006]
    expected_services: [ts-contacts-service, ts-preserve-service]
    cleanup_strategy: restore_modified_rows_from_snapshot
    variants:
      - id: contact_account_swap_single
        mode: single_point
        target_service: ts-contacts-service
        target_db: ts-contacts-mysql
        target_table: contacts
        target_field: account_id
        condition: account_id IS NOT NULL
        modify_value: OTHER_USER
        expected_propagation: [ts-contacts-service, ts-preserve-service]
      - id: preserve_foreign_contact_cascade
        mode: cascading
        target_service: ts-preserve-service
        target_db: ts-preserve-mysql
        target_table: preserve_orders
        target_field: contacts_id
        condition: contacts_id IS NOT NULL
        modify_value: FOREIGN_CONTACT
        expected_propagation: [ts-preserve-service, ts-contacts-service, ts-order-service]

  - id: trip_reference_break
    name: Trip search references invalid route or station data
    journey: trip_search
    entity: trip
    invariant: INV-TRIP-REF-007
    dimension: stale_configuration
    semantic_violation_type: stale_business_configuration
    injector_family: database_modifier
    canary_status: pending_runtime_validation
    expected_impacts: [invalid_trip_reference]
    expected_business_slis: [trip_search_success_rate]
    expected_invariants: [INV-TRIP-REF-007]
    expected_services: [ts-travel-service, ts-route-service, ts-station-service]
    cleanup_strategy: restore_modified_rows_from_snapshot
    variants:
      - id: trip_missing_route_single
        mode: single_point
        target_service: ts-travel-service
        target_db: ts-travel-mysql
        target_table: trips
        target_field: route_id
        condition: route_id IS NOT NULL
        modify_value: MISSING_ROUTE
        expected_propagation: [ts-travel-service, ts-route-service]
      - id: trip_station_route_cascade
        mode: cascading
        target_service: ts-route-service
        target_db: ts-route-mysql
        target_table: routes
        target_field: start_station
        condition: start_station IS NOT NULL
        modify_value: MISSING_STATION
        expected_propagation: [ts-route-service, ts-station-service, ts-travel-service]

  - id: addon_orphan_order
    name: Optional addon references missing or invalid ticket order
    journey: optional_addons
    entity: food_order
    invariant: INV-ADDON-ORDER-011
    dimension: data_consistency
    semantic_violation_type: orphan_addon_order
    injector_family: database_modifier
    canary_status: pending_runtime_validation
    expected_impacts: [orphan_addon_order]
    expected_business_slis: [order_read_success_rate]
    expected_invariants: [INV-ADDON-ORDER-011]
    expected_services: [ts-food-delivery-service, ts-order-service, ts-assurance-service, ts-consign-service]
    cleanup_strategy: restore_modified_rows_from_snapshot
    variants:
      - id: food_order_missing_parent_single
        mode: single_point
        target_service: ts-assurance-service
        target_db: ts-assurance-mysql
        target_table: assurance
        target_field: orderId
        condition: orderId IS NOT NULL
        modify_value: NONEXISTENT_ORDER
        expected_propagation: [ts-assurance-service, ts-order-service]
      - id: addon_parent_order_cascade
        mode: cascading
        target_service: ts-consign-service
        target_db: ts-consign-mysql
        target_table: consign
        target_field: orderId
        condition: orderId = (SELECT order_id FROM consign_record WHERE order_id IS NOT NULL LIMIT 1)
        modify_value: NONEXISTENT_ORDER
        expected_propagation: [ts-consign-service, ts-assurance-service, ts-order-service]

  - id: preserve_booking_validation_bypass
    name: Booking precheck validation bypassed during preserve
    journey: ticket_booking
    entity: order
    invariant: INV-PRESERVE-BYPASS-012
    dimension: business_logic
    semantic_violation_type: preserve_validation_bypass
    injector_family: database_modifier
    canary_status: pending_runtime_validation
    expected_impacts: [preserve_validation_bypass, passenger_info_inconsistency]
    expected_business_slis: [booking_precheck_success_rate, order_read_success_rate]
    expected_invariants: [INV-PRESERVE-BYPASS-012]
    expected_services: [ts-preserve-service, ts-order-service, ts-contacts-service]
    cleanup_strategy: restore_modified_rows_from_snapshot
    variants:
      - id: empty_passenger_name_single
        mode: single_point
        target_service: ts-preserve-service
        target_db: ts-order-mysql
        target_table: orders
        target_field: contacts_name
        condition: status IN (1, 2) AND contacts_name IS NOT NULL AND contacts_name <> ''
        modify_value: BYPASSED_EMPTY_NAME
        expected_propagation: [ts-preserve-service, ts-order-service]
      - id: empty_document_number_cascade
        mode: cascading
        target_service: ts-preserve-service
        target_db: ts-order-mysql
        target_table: orders
        target_field: contacts_document_number
        condition: status IN (1, 2) AND contacts_document_number IS NOT NULL AND contacts_document_number <> ''
        modify_value: BYPASSED_EMPTY_DOC
        expected_propagation: [ts-preserve-service, ts-order-service, ts-contacts-service]

  - id: order_price_divergence
    name: Order price diverges from configured route price
    journey: ticket_booking
    entity: order
    invariant: INV-PRICE-ORDER-003
    dimension: amount_or_price_drift
    semantic_violation_type: price_configuration_drift
    injector_family: database_modifier
    canary_status: pending_runtime_validation
    expected_impacts: [order_price_configuration_violation]
    expected_business_slis: [booking_precheck_success_rate, order_read_business_invalid_rate]
    expected_invariants: [INV-PRICE-ORDER-003]
    expected_services: [ts-order-service, ts-price-service, ts-basic-service]
    cleanup_strategy: restore_modified_rows_from_snapshot
    variants:
      - id: negative_order_price_single
        mode: single_point
        target_service: ts-order-service
        target_db: ts-order-mysql
        target_table: orders
        target_field: price
        condition: status IN (1, 2) AND price > 0
        modify_value: -1
        expected_propagation: [ts-order-service, ts-price-service]
      - id: zero_order_price_cascade
        mode: cascading
        target_service: ts-order-service
        target_db: ts-order-mysql
        target_table: orders
        target_field: price
        condition: status IN (1, 2) AND price > 1
        modify_value: 0.01
        expected_propagation: [ts-order-service, ts-price-service, ts-inside-payment-service]

  - id: seat_double_booking
    name: Two active orders assigned the same seat on same train
    journey: ticket_booking
    entity: seat
    invariant: INV-SEAT-UNIQUE-013
    dimension: partial_workflow_commit
    semantic_violation_type: seat_allocation_conflict
    injector_family: database_modifier
    canary_status: pending_runtime_validation
    expected_impacts: [seat_allocation_conflict, seat_uniqueness_violation]
    expected_business_slis: [booking_precheck_business_invalid_rate, duplicate_seat_assignment_count]
    expected_invariants: [INV-SEAT-UNIQUE-013]
    expected_services: [ts-seat-service, ts-preserve-service, ts-order-service]
    cleanup_strategy: restore_modified_rows_from_snapshot
    variants:
      - id: duplicate_seat_single_order_single
        mode: single_point
        target_service: ts-seat-service
        target_db: ts-order-mysql
        target_table: orders
        target_field: status
        condition: train_number = 'G1234' AND seat_number = 'FirstClass-30' AND status NOT IN (1, 2, 5)
        modify_value: 1
        expected_propagation: [ts-seat-service, ts-order-service]
      - id: concrete_seat_conflict_cascade
        mode: cascading
        target_service: ts-seat-service
        target_db: ts-order-mysql
        target_table: orders
        target_field: status
        condition: train_number = 'G1235' AND seat_number = 'FirstClass-30' AND status NOT IN (1, 2, 5)
        modify_value: 2
        expected_propagation: [ts-seat-service, ts-preserve-service, ts-order-service]

  - id: notification_order_orphan
    name: Notification references invalid or missing ticket order
    journey: notification
    entity: notification
    invariant: INV-NOTIFY-ORDER-014
    dimension: data_consistency
    semantic_violation_type: orphan_notification_order
    injector_family: database_modifier
    canary_status: pending_runtime_validation
    expected_impacts: [orphan_notification_order, notification_delivery_failure]
    expected_business_slis: [order_read_success_rate]
    expected_invariants: [INV-NOTIFY-ORDER-014]
    expected_services: [ts-notification-service, ts-order-service]
    cleanup_strategy: restore_modified_rows_from_snapshot
    variants:
      - id: notification_bad_order_single
        mode: single_point
        target_service: ts-notification-service
        target_db: ts-notification-mysql
        target_table: notify_info
        target_field: order_number
        condition: order_number IS NOT NULL AND order_number <> ''
        modify_value: NONEXISTENT_ORDER
        expected_propagation: [ts-notification-service, ts-order-service]
      - id: notification_suppressed_cascade
        mode: cascading
        target_service: ts-notification-service
        target_db: ts-notification-mysql
        target_table: notify_info
        target_field: send_status
        condition: send_status IS NOT NULL
        modify_value: 1
        expected_propagation: [ts-notification-service, ts-order-service]

  - id: config_value_drift
    name: System configuration value drifts from expected range
    journey: admin_manage
    entity: config
    invariant: INV-CONFIG-DRIFT-015
    dimension: stale_configuration
    semantic_violation_type: config_value_drift
    injector_family: database_modifier
    canary_status: pending_runtime_validation
    expected_impacts: [config_value_drift, stale_business_configuration]
    expected_business_slis: [trip_search_business_invalid_rate, config_missing_key_count, config_out_of_range_count]
    expected_invariants: [INV-CONFIG-DRIFT-015]
    expected_services: [ts-config-service, ts-travel-service, ts-order-service, ts-price-service]
    cleanup_strategy: restore_modified_rows_from_snapshot
    variants:
      - id: direct_ticket_allocation_zero_single
        mode: single_point
        target_service: ts-config-service
        target_db: ts-config-mysql
        target_table: config
        target_field: value
        condition: name = 'DirectTicketAllocationProportion' AND value > 0
        modify_value: 0.0
        expected_propagation: [ts-config-service, ts-travel-service]
      - id: direct_ticket_allocation_one_cascade
        mode: cascading
        target_service: ts-config-service
        target_db: ts-config-mysql
        target_table: config
        target_field: value
        condition: name = 'DirectTicketAllocationProportion' AND value < 1
        modify_value: 1.0
        expected_propagation: [ts-config-service, ts-travel-service, ts-order-service, ts-price-service]

  - id: security_threshold_bypass

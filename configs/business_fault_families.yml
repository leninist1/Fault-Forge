  - id: voucher_order_orphan
    name: Voucher references invalid or missing ticket order
    journey: voucher
    entity: order
    invariant: INV-VOUCHER-ORDER-017
    dimension: data_consistency
    semantic_violation_type: orphan_voucher_order
    injector_family: database_modifier
    canary_status: pending_runtime_validation
